<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script>
      window.DecapCms.init({
        config: {
          backend: {
            name: "github",
            repo: "sora0116/homepage",
            branch: "main",
            base_url: window.location.origin,
            auth_endpoint: "api/decap/auth"
          },
          media_folder: "public/uploads",
          public_folder: "/uploads",
          locale: "ja",
          collections: [
            {
              name: "blog",
              label: "ブログ",
              folder: "src/content/blog",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "タイトル", name: "title", widget: "string" },
                { label: "概要", name: "description", widget: "text" },
                {
                  label: "公開日",
                  name: "date",
                  widget: "datetime",
                  format: "YYYY-MM-DD"
                },
                { label: "タグ", name: "tags", widget: "list", required: false },
                {
                  label: "下書き",
                  name: "draft",
                  widget: "boolean",
                  default: false
                },
                {
                  label: "カバー画像",
                  name: "cover",
                  widget: "image",
                  required: false
                },
                { label: "本文", name: "body", widget: "markdown" }
              ]
            },
            {
              name: "works",
              label: "作品",
              folder: "src/content/works",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "タイトル", name: "title", widget: "string" },
                { label: "概要", name: "summary", widget: "text" },
                {
                  label: "公開日",
                  name: "publishedAt",
                  widget: "datetime",
                  format: "YYYY-MM-DD"
                },
                { label: "タグ", name: "tags", widget: "list", required: false },
                {
                  label: "外部リンク",
                  name: "links",
                  widget: "list",
                  required: false,
                  fields: [
                    { label: "ラベル", name: "label", widget: "string" },
                    { label: "URL", name: "href", widget: "string" }
                  ]
                },
                {
                  label: "サムネイル",
                  name: "thumbnail",
                  widget: "image",
                  required: false
                },
                {
                  label: "代表表示",
                  name: "featured",
                  widget: "boolean",
                  default: false
                },
                { label: "本文", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
