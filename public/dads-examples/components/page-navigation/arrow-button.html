<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ページナビゲーション</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../global.css">
<link rel="stylesheet" href="page-navigation.css">
</head>
<body>

<nav class="dads-page-navigation" aria-label="ページ">
  <button class="dads-page-navigation__arrow-button" type="button" data-size="lg" data-control="prev">
    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m7.9 12 8-8-1.4-1.4L5.1 12l9.4 9.4 1.4-1.4z" fill="currentcolor"/>
    </svg>
    <span class="dads-u-visually-hidden">前のページ</span>
  </button>
  <span class="dads-page-navigation__counter">5 / 9,999</span>
  <button class="dads-page-navigation__arrow-button" type="button" data-size="lg" data-control="next">
    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 2.6 7.6 4l8 8-8 8L9 21.4l9.4-9.4z" fill="currentcolor"/>
    </svg>
    <span class="dads-u-visually-hidden">次のページ</span>
  </button>
</nav>

</body>
</html>
